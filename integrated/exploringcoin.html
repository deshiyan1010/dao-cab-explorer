    <script>
        function myFunction() {
            var x = document.getElementById("myDIV");
            if (x.style.display === "none") {
                x.style.display = "block";
            } else {
                x.style.display = "none";
            }
        }
    </script>
    <script>

            if (x.style.display === "none") {

                x.style.display = "none";
            }
        }

        var myObject4 = eval('(' + data4 + ')')
        console.log(typeof(data),typeof(myObject))

            temp += `

                <td> ${myObject[i].timestamp}</td>
            </tr>
            <br>
            `
        }
        temp+='<br>'

        document.getElementById("myTable").innerHTML = temp;
        
        var temp="";
